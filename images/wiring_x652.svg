<svg width="860" height="420" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="860" height="420" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="bold">接线图 — ESP32 + SN65HVD230 → Tesla CAN Bus（X652，旧款 Model 3 2020 及以前）</text>

  <!-- ════════════════ ESP32 Board ════════════════ -->
  <rect x="30" y="65" width="160" height="300" rx="10" fill="#161b22" stroke="#388bfd" stroke-width="2"/>
  <rect x="48" y="140" width="124" height="8" rx="2" fill="#21262d"/>
  <rect x="48" y="240" width="124" height="8" rx="2" fill="#21262d"/>
  <rect x="68" y="158" width="84" height="72" rx="5" fill="#21262d" stroke="#388bfd" stroke-width="1.5"/>
  <text x="110" y="192" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">ESP32</text>
  <text x="110" y="208" text-anchor="middle" fill="#6e7681" font-size="9">WROOM-32</text>
  <text x="110" y="90" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">ESP32 DevKit</text>
  <rect x="85" y="318" width="50" height="20" rx="3" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="110" y="332" text-anchor="middle" fill="#6e7681" font-size="9">USB</text>

  <!-- ESP32 right-side pins -->
  <!-- 3.3V -->
  <rect x="174" y="113" width="18" height="14" rx="2" fill="#f85149"/>
  <line x1="184" y1="120" x2="230" y2="120" stroke="#f85149" stroke-width="2.5"/>
  <text x="168" y="124" text-anchor="end" fill="#f85149" font-size="12" font-weight="bold">3.3V</text>

  <!-- GND -->
  <rect x="174" y="153" width="18" height="14" rx="2" fill="#8b949e"/>
  <line x1="184" y1="160" x2="230" y2="160" stroke="#8b949e" stroke-width="2.5"/>
  <text x="168" y="164" text-anchor="end" fill="#8b949e" font-size="12" font-weight="bold">GND</text>

  <!-- GPIO 5 -->
  <rect x="174" y="233" width="18" height="14" rx="2" fill="#58a6ff"/>
  <line x1="184" y1="240" x2="230" y2="240" stroke="#58a6ff" stroke-width="2.5"/>
  <text x="168" y="237" text-anchor="end" fill="#58a6ff" font-size="11" font-weight="bold">GPIO 5</text>
  <text x="168" y="250" text-anchor="end" fill="#6e7681" font-size="9">TX →</text>

  <!-- GPIO 4 -->
  <rect x="174" y="273" width="18" height="14" rx="2" fill="#3fb950"/>
  <line x1="184" y1="280" x2="230" y2="280" stroke="#3fb950" stroke-width="2.5"/>
  <text x="168" y="277" text-anchor="end" fill="#3fb950" font-size="11" font-weight="bold">GPIO 4</text>
  <text x="168" y="290" text-anchor="end" fill="#6e7681" font-size="9">← RX</text>

  <!-- ════════════════ SN65HVD230 Module ════════════════ -->
  <rect x="310" y="85" width="180" height="260" rx="10" fill="#161b22" stroke="#d2a679" stroke-width="2"/>
  <rect x="345" y="165" width="110" height="50" rx="4" fill="#21262d" stroke="#d2a679" stroke-width="1.5"/>
  <text x="400" y="188" text-anchor="middle" fill="#d2a679" font-size="10" font-weight="bold">SN65HVD230</text>
  <text x="400" y="202" text-anchor="middle" fill="#6e7681" font-size="8">CAN Transceiver</text>
  <text x="400" y="108" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">SN65HVD230</text>
  <text x="400" y="124" text-anchor="middle" fill="#8b949e" font-size="10">CAN 收发器模块</text>
  <rect x="330" y="298" width="140" height="28" rx="4" fill="#1f2937" stroke="#d2a679" stroke-width="1"/>
  <text x="400" y="311" text-anchor="middle" fill="#fbbf24" font-size="9">⚠ 购买 3.3V 版本</text>
  <text x="400" y="322" text-anchor="middle" fill="#6e7681" font-size="8">不要买 5V 版本</text>

  <!-- Module left pins -->
  <rect x="308" y="113" width="14" height="14" rx="2" fill="#f85149"/>
  <text x="326" y="124" fill="#f85149" font-size="11" font-weight="bold">VCC</text>
  <rect x="308" y="153" width="14" height="14" rx="2" fill="#8b949e"/>
  <text x="326" y="164" fill="#8b949e" font-size="11" font-weight="bold">GND</text>
  <rect x="308" y="233" width="14" height="14" rx="2" fill="#58a6ff"/>
  <text x="326" y="244" fill="#58a6ff" font-size="11" font-weight="bold">CTX / D</text>
  <rect x="308" y="273" width="14" height="14" rx="2" fill="#3fb950"/>
  <text x="326" y="284" fill="#3fb950" font-size="11" font-weight="bold">CRX / R</text>

  <!-- Module right pins -->
  <rect x="490" y="233" width="14" height="14" rx="2" fill="#e3b341"/>
  <line x1="490" y1="240" x2="560" y2="240" stroke="#e3b341" stroke-width="2.5"/>
  <text x="488" y="244" text-anchor="end" fill="#e3b341" font-size="11" font-weight="bold">CANH</text>
  <rect x="490" y="273" width="14" height="14" rx="2" fill="#bc8cff"/>
  <line x1="490" y1="280" x2="560" y2="280" stroke="#bc8cff" stroke-width="2.5"/>
  <text x="488" y="284" text-anchor="end" fill="#bc8cff" font-size="11" font-weight="bold">CANL</text>

  <!-- ════════════════ Wires ESP32 → Module ════════════════ -->
  <polyline points="192,120 250,120 250,120 308,120" fill="none" stroke="#f85149" stroke-width="2.5"/>
  <polyline points="192,160 260,160 260,160 308,160" fill="none" stroke="#8b949e" stroke-width="2.5"/>
  <polyline points="192,240 308,240" fill="none" stroke="#58a6ff" stroke-width="2.5"/>
  <polyline points="192,280 308,280" fill="none" stroke="#3fb950" stroke-width="2.5"/>

  <!-- ════════════════ Tesla X652 Connector ════════════════ -->
  <rect x="630" y="155" width="200" height="195" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <!-- Connector body -->
  <rect x="655" y="200" width="150" height="110" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>

  <!-- Pin grid: X652 has many pins, show a representative grid -->
  <!-- Row 1 (top row, pins 1-6) -->
  <circle cx="675" cy="222" r="6" fill="#30363d" stroke="#e3b341" stroke-width="2"/>
  <text x="675" y="226" text-anchor="middle" fill="#e3b341" font-size="8" font-weight="bold">1</text>
  <circle cx="700" cy="222" r="6" fill="#30363d" stroke="#bc8cff" stroke-width="2"/>
  <text x="700" y="226" text-anchor="middle" fill="#bc8cff" font-size="8" font-weight="bold">2</text>
  <circle cx="725" cy="222" r="5" fill="#30363d" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="750" cy="222" r="5" fill="#30363d" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="775" cy="222" r="5" fill="#30363d" stroke="#30363d" stroke-width="1.5"/>
  <!-- Row 2 -->
  <circle cx="675" cy="252" r="5" fill="#30363d" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="700" cy="252" r="5" fill="#30363d" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="725" cy="252" r="5" fill="#30363d" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="750" cy="252" r="5" fill="#30363d" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="775" cy="252" r="5" fill="#30363d" stroke="#30363d" stroke-width="1.5"/>
  <!-- Row 3 -->
  <circle cx="675" cy="282" r="5" fill="#30363d" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="700" cy="282" r="5" fill="#30363d" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="725" cy="282" r="5" fill="#30363d" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="750" cy="282" r="5" fill="#30363d" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="775" cy="282" r="5" fill="#30363d" stroke="#30363d" stroke-width="1.5"/>

  <!-- Pin labels -->
  <text x="675" y="242" text-anchor="middle" fill="#e3b341" font-size="7">CAN-H</text>
  <text x="700" y="242" text-anchor="middle" fill="#bc8cff" font-size="7">CAN-L</text>

  <!-- Connector label -->
  <text x="730" y="178" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Tesla X652</text>
  <text x="730" y="193" text-anchor="middle" fill="#8b949e" font-size="9">（Model 3 2020 及以前）</text>
  <text x="730" y="328" text-anchor="middle" fill="#6e7681" font-size="9">其余引脚不接</text>

  <!-- CAN-H wire to Pin 1 -->
  <polyline points="560,240 600,240 600,222 669,222" fill="none" stroke="#e3b341" stroke-width="2.5"/>
  <text x="582" y="234" fill="#e3b341" font-size="10" font-weight="bold">CAN-H</text>

  <!-- CAN-L wire to Pin 2 -->
  <polyline points="560,280 608,280 608,230 694,230" fill="none" stroke="#bc8cff" stroke-width="2.5"/>
  <text x="582" y="275" fill="#bc8cff" font-size="10" font-weight="bold">CAN-L</text>

  <!-- ════════════════ Legend ════════════════ -->
  <rect x="30" y="385" width="800" height="22" rx="4" fill="#161b22"/>
  <circle cx="50" cy="396" r="4" fill="#f85149"/>
  <text x="58" y="400" fill="#f85149" font-size="10">电源 3.3V</text>
  <circle cx="130" cy="396" r="4" fill="#8b949e"/>
  <text x="138" y="400" fill="#8b949e" font-size="10">地线 GND</text>
  <circle cx="210" cy="396" r="4" fill="#58a6ff"/>
  <text x="218" y="400" fill="#58a6ff" font-size="10">TX 数据</text>
  <circle cx="290" cy="396" r="4" fill="#3fb950"/>
  <text x="298" y="400" fill="#3fb950" font-size="10">RX 数据</text>
  <circle cx="380" cy="396" r="4" fill="#e3b341"/>
  <text x="388" y="400" fill="#e3b341" font-size="10">CAN-H 总线</text>
  <circle cx="480" cy="396" r="4" fill="#bc8cff"/>
  <text x="488" y="400" fill="#bc8cff" font-size="10">CAN-L 总线</text>
  <text x="610" y="400" fill="#6e7681" font-size="10">总共 4 根杜邦线 + 2 根 CAN 线</text>
</svg>
